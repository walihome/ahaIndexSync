name: Pipeline

on:
  workflow_call:
    inputs:
      table_suffix:
        description: '数据库表后缀，生产为空，测试为 _test'
        type: string
        default: ""
      scraper_name:
        description: '指定单个 scraper 类名，为空时跑全量'
        type: string
        default: ""

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ inputs.table_suffix != '' }}  # 只在测试环境执行
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cleanup test tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
        run: python cleanup.py

  scrape:
    runs-on: ubuntu-latest
    needs: cleanup
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrape
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
          SCRAPER_NAME: ${{ inputs.scraper_name }}
        run: python scrape.py

  process:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run process
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
        run: python process.py

  rank:
    runs-on: ubuntu-latest
    needs: process
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rank
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
        run: python rank.py
