name: Pipeline

on:
  workflow_call:
    inputs:
      table_suffix:
        description: '数据库表后缀，生产为空，测试为 _test'
        type: string
        default: ""
      scraper_name:
        description: '指定单个 scraper 类名，为空时跑全量'
        type: string
        default: ""

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ inputs.table_suffix != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cleanup test tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
        run: python cleanup.py

  scrape:
    runs-on: ubuntu-latest
    needs: cleanup
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore twscrape accounts
        env:
          TWSCRAPE_DB_BASE64: ${{ secrets.TWSCRAPE_DB_BASE64 }}
        run: |
          if [ -n "$TWSCRAPE_DB_BASE64" ]; then
            echo "$TWSCRAPE_DB_BASE64" | base64 -d > .twscrape_accounts.db
            echo "✅ twscrape accounts restored"
          else
            echo "⚠️ TWSCRAPE_DB_BASE64 未设置，Twitter 抓取将跳过"
          fi

      - name: Run scrape
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
          SCRAPER_NAME: ${{ inputs.scraper_name }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: python scrape.py

  process:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run process
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
        run: python process.py

  rank:
    runs-on: ubuntu-latest
    needs: process
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rank
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
        run: python rank.py

  archive:
    runs-on: ubuntu-latest
    needs: rank
    if: ${{ always() && inputs.table_suffix == '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate archive data
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: python generate_archives.py

  deploy:
    runs-on: ubuntu-latest
    needs: archive
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export data to OSS
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
        run: python export_oss.py

      - name: Refresh CDN (homepage)
        if: ${{ inputs.table_suffix == '' }}
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          pip install alibabacloud_cdn20180510 --quiet
          python3 - <<'EOF'
          import os
          from alibabacloud_cdn20180510.client import Client
          from alibabacloud_cdn20180510 import models as cdn_models
          from alibabacloud_tea_openapi import models as open_api_models

          config = open_api_models.Config(
              access_key_id=os.environ['ALIBABA_CLOUD_ACCESS_KEY_ID'],
              access_key_secret=os.environ['ALIBABA_CLOUD_ACCESS_KEY_SECRET'],
              endpoint='cdn.aliyuncs.com'
          )
          client = Client(config)

          urls = [
              'https://www.amazingindex.com/',
              'https://www.amazingindex.com/index.html',
          ]

          request = cdn_models.RefreshObjectCachesRequest(
              object_path='\n'.join(urls),
              object_type='File'
          )
          client.refresh_object_caches(request)
          print(f"✅ CDN refreshed: {len(urls)} URLs")
          EOF

      - name: Generate sitemap
        if: ${{ inputs.table_suffix == '' }}
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
          OSS_BUCKET: amazingindex
        run: python scripts/generate_sitemap.py