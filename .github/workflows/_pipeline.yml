name: Pipeline

on:
  workflow_call:
    inputs:
      table_suffix:
        description: '数据库表后缀，生产为空，测试为 _test'
        type: string
        default: ""
      scraper_name:
        description: '指定 scraper name，为空时跑全量'
        type: string
        default: ""
      run_mode:
        description: '运行模式: daily / test / manual'
        type: string
        default: "daily"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore twscrape accounts
        env:
          TWSCRAPE_DB_BASE64: ${{ secrets.TWSCRAPE_DB_BASE64 }}
        run: |
          if [ -n "$TWSCRAPE_DB_BASE64" ]; then
            echo "$TWSCRAPE_DB_BASE64" | base64 -d > .twscrape_accounts.db
            echo "✅ twscrape accounts restored"
          else
            echo "⚠️ TWSCRAPE_DB_BASE64 未设置，Twitter 抓取将跳过"
          fi

      - name: Run pipeline
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
          RUN_MODE: ${{ inputs.run_mode }}
          SCRAPER_NAME: ${{ inputs.scraper_name }}
        run: python main.py --mode "$RUN_MODE" --suffix "$TABLE_SUFFIX" --scraper "$SCRAPER_NAME"

  # 生产跑完后通知 ahaIndex2；表后缀为 _test 时不触发（测试库不同步到前端流水线）
  notify-ahaindex2:
    needs: run
    if: success() && inputs.table_suffix != '_test'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch ahaIndex2 workflow
        env:
          TOKEN: ${{ secrets.AHAINDEX2_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ vars.AHAINDEX2_REPO }}
          WORKFLOW_FILE: ${{ vars.AHAINDEX2_WORKFLOW_FILE }}
          TARGET_REF: ${{ vars.AHAINDEX2_DISPATCH_REF }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ] || [ -z "${TARGET_REPO:-}" ]; then
            echo "Skip ahaIndex2 dispatch: set secrets.AHAINDEX2_DISPATCH_TOKEN and vars.AHAINDEX2_REPO (owner/name)."
            exit 0
          fi
          wf="${WORKFLOW_FILE:-}"
          if [ -z "$wf" ]; then
            echo "Skip ahaIndex2 dispatch: set vars.AHAINDEX2_WORKFLOW_FILE to the workflow file name in ahaIndex2 (e.g. deploy.yml)."
            exit 0
          fi
          ref="${TARGET_REF:-main}"
          url="https://api.github.com/repos/${TARGET_REPO}/actions/workflows/${wf}/dispatches"
          echo "POST ${url} (ref=${ref})"
          code="$(curl -sS -o /tmp/gh_dispatch_body.txt -w '%{http_code}' \
            -X POST "$url" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "{\"ref\":\"${ref}\"}")"
          if [ "$code" != "204" ]; then
            echo "GitHub API HTTP ${code}"
            cat /tmp/gh_dispatch_body.txt
            exit 1
          fi
          echo "ahaIndex2 workflow_dispatch ok"
