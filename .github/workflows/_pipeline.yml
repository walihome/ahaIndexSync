name: Pipeline

on:
  workflow_call:
    inputs:
      table_suffix:
        description: '数据库表后缀，生产为空，测试为 _test'
        type: string
        default: ""
      scraper_name:
        description: '指定 scraper name，为空时跑全量'
        type: string
        default: ""
      run_mode:
        description: '运行模式: daily / test / manual'
        type: string
        default: "daily"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore twscrape accounts
        env:
          TWSCRAPE_DB_BASE64: ${{ secrets.TWSCRAPE_DB_BASE64 }}
        run: |
          if [ -n "$TWSCRAPE_DB_BASE64" ]; then
            echo "$TWSCRAPE_DB_BASE64" | base64 -d > .twscrape_accounts.db
            echo "✅ twscrape accounts restored"
          else
            echo "⚠️ TWSCRAPE_DB_BASE64 未设置，Twitter 抓取将跳过"
          fi

      - name: Run pipeline
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
          RUN_MODE: ${{ inputs.run_mode }}
          SCRAPER_NAME: ${{ inputs.scraper_name }}
        run: python main.py --mode "$RUN_MODE" --suffix "$TABLE_SUFFIX" --scraper "$SCRAPER_NAME"
