name: Pipeline

on:
  workflow_call:
    inputs:
      table_suffix:
        description: '数据库表后缀，生产为空，测试为 _test'
        type: string
        default: ""
      scraper_name:
        description: '指定 scraper name，为空时跑全量'
        type: string
        default: ""
      run_mode:
        description: '运行模式: daily / test / manual'
        type: string
        default: "daily"
      override_date:
        description: '指定 snapshot_date（如 2026-05-03），用于回补历史数据，留空使用当天日期'
        type: string
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TZ: Asia/Shanghai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          TABLE_SUFFIX: ${{ inputs.table_suffix }}
          RUN_MODE: ${{ inputs.run_mode }}
          SCRAPER_NAME: ${{ inputs.scraper_name }}
          OVERRIDE_DATE: ${{ inputs.override_date }}
        run: |
          ARGS="--mode $RUN_MODE"
          if [ -n "$TABLE_SUFFIX" ]; then
            ARGS="$ARGS --suffix $TABLE_SUFFIX"
          fi
          if [ -n "$SCRAPER_NAME" ]; then
            ARGS="$ARGS --scraper $SCRAPER_NAME"
          fi
          if [ -n "$OVERRIDE_DATE" ]; then
            ARGS="$ARGS --date $OVERRIDE_DATE"
          fi
          python main.py $ARGS

      - name: Trigger ahaIndex2 dispatch
        if: ${{ inputs.run_mode != 'test' }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/walihome/ahaIndex2/dispatches \
            -d '{"event_type":"pipeline-done"}'
