name: Run PROD

on:
  schedule:
    - cron: '0 18 * * *'  # 北京时间凌晨 2:00 (UTC+8)
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_pipeline.yml
    with:
      table_suffix: ""
      run_mode: "daily"
    secrets: inherit

  trigger-ahaindex2:
    needs: run
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ahaIndex2 Build & Deploy
        env:
          DISPATCH_TOKEN: ${{ secrets.AHAINDEX2_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "AHAINDEX2_DISPATCH_TOKEN not set, skipping ahaIndex2 dispatch"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/walihome/ahaIndex2/dispatches \
            -d '{"event_type":"external-workflow-complete","client_payload":{"source":"${{ github.repository }}","run_id":"${{ github.run_id }}"}}'
